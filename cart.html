<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | The Budget Birdie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>The Budget Birdie</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="deals.html">Shop Deals</a></li>
                <li><a href="clubs.html">Clubs</a></li>
                <li><a href="apparel.html">Apparel</a></li>
                <li><a href="accessories.html">Balls & Accessories</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 style="text-align: center; margin-top: 20px;">Your Shopping Cart</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                
            </tbody>
            <tfoot>
                <tr>
                    <td><strong>Total</strong></td>
                    <td><strong>$<span id="total-price">0.00</span></strong></td>
                </tr>
            </tfoot>
        </table>

        <div style="text-align: center; margin-top: 20px;">
            <button onclick="clearCart()" style="background-color: #cc0000; color: white; padding: 10px; border-radius: 5px; cursor: pointer;">Clear Cart</button>
            <button onclick="alert('This is a school project. No actual checkout available!')" style="background-color: #5d8a5d; color: white; padding: 10px; border-radius: 5px; cursor: pointer; margin-left: 10px;">Checkout</button>
        </div>
    </main>

    <footer>
        <p style="text-align: center;">&copy; 2026 The Budget Birdie | Student Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
